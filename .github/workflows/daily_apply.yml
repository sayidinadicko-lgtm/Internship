name: Daily Job Search & Apply

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt && sudo apt-get install -y --fix-missing libreoffice

      - name: Create .env
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}" >> .env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
          echo "NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}" >> .env
          echo "FT_CLIENT_ID=${{ secrets.FT_CLIENT_ID }}" >> .env
          echo "FT_CLIENT_SECRET=${{ secrets.FT_CLIENT_SECRET }}" >> .env

      - name: Run
        run: |
          python main.py \
            --query "${{ vars.SEARCH_QUERY }}" \
            --max ${{ vars.MAX_JOBS }}

      - name: Upload docs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-${{ github.run_id }}
          path: output/
          retention-days: 7
